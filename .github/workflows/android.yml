name: Android Debug APK

on:
  push:
    branches:
      - 'claude/refactor-pwa-native-android-**'
      - 'main'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build web bundle for native
        # Use vite + cap copy directly (NOT `npm run build:native`, which
        # also runs `cap sync` — sync rewrites the android/ tree and on
        # some CI runs leaves capacitor-cordova-android-plugins/ missing
        # the cordova.variables.gradle file that Gradle imports.
        run: |
          npx tsc -b
          CAPACITOR_BUILD=1 npx vite build
          npx cap copy android
        env:
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}

      - name: Diagnose cordova plugin folder
        run: |
          echo "Contents of android/capacitor-cordova-android-plugins/:"
          ls -la android/capacitor-cordova-android-plugins/ || echo "MISSING"
          echo ""
          if [ -f android/capacitor-cordova-android-plugins/cordova.variables.gradle ]; then
            echo "cordova.variables.gradle is present ($(wc -c < android/capacitor-cordova-android-plugins/cordova.variables.gradle) bytes)"
          else
            echo "ERROR: cordova.variables.gradle is missing!"
            exit 1
          fi

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bjj-dojo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
