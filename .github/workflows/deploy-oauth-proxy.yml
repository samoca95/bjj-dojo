name: Deploy OAuth Proxy (Cloudflare Worker)

on:
  push:
    branches: ['main', 'claude/refactor-pwa-native-android-**']
    paths:
      - 'oauth-proxy/**'
      - '.github/workflows/deploy-oauth-proxy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: oauth-proxy
          # Wrangler reads worker.ts + wrangler.toml from the working dir.
          command: deploy

      - name: Print proxy URL
        run: |
          echo ""
          echo "==========================================================="
          echo "  OAuth proxy deployed."
          echo ""
          echo "  Copy the URL above (it looks like:"
          echo "    https://bjj-dojo-oauth-proxy.<account>.workers.dev)"
          echo ""
          echo "  Then add it as a repo secret:"
          echo "    Settings -> Secrets and variables -> Actions"
          echo "    Name:  VITE_GITHUB_OAUTH_PROXY_URL"
          echo "    Value: <the URL you copied, no trailing slash>"
          echo "==========================================================="
