<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!--
    Black belt design evoking the kanji 工 (craft/work).
    A tied BJJ black belt viewed from above creates two horizontal
    bands with a central vertical knot — the same structure as 工.
  -->

  <!-- Top horizontal belt band -->
  <rect x="60" y="174" width="392" height="60" rx="14" fill="#d4a017"/>
  <!-- Bottom horizontal belt band -->
  <rect x="60" y="278" width="392" height="60" rx="14" fill="#d4a017"/>
  <!-- Central vertical knot connecting both bands -->
  <rect x="226" y="148" width="60" height="216" rx="12" fill="#d4a017"/>

  <!-- Cutouts to shape the 工 negative space -->
  <!-- Left gap top band -->
  <rect x="68" y="182" width="150" height="44" rx="6" fill="#0a0a0a"/>
  <!-- Right gap top band -->
  <rect x="294" y="182" width="150" height="44" rx="6" fill="#0a0a0a"/>
  <!-- Left gap bottom band -->
  <rect x="68" y="286" width="150" height="44" rx="6" fill="#0a0a0a"/>
  <!-- Right gap bottom band -->
  <rect x="294" y="286" width="150" height="44" rx="6" fill="#0a0a0a"/>

  <!-- Belt stripe detail on the knot (traditional rank stripe) -->
  <rect x="226" y="246" width="60" height="20" rx="4" fill="#0a0a0a" opacity="0.55"/>

  <!-- Subtle side panels that give depth to the belt ends -->
  <rect x="60" y="182" width="18" height="44" rx="4" fill="#b88a12" opacity="0.7"/>
  <rect x="434" y="182" width="18" height="44" rx="4" fill="#b88a12" opacity="0.7"/>
  <rect x="60" y="286" width="18" height="44" rx="4" fill="#b88a12" opacity="0.7"/>
  <rect x="434" y="286" width="18" height="44" rx="4" fill="#b88a12" opacity="0.7"/>
</svg>
