<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BJJ Dojo — connecting…</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #d4d4d8;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 16px;
      }
      .msg {
        font-size: 14px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="msg" id="msg">Connecting…</div>
    </div>
    <script>
      // Relay the OAuth response back to the opener window via postMessage.
      // The opener verifies `state` and exchanges the `code` for tokens.
      ;(function () {
        var params = new URLSearchParams(window.location.search)
        var hashParams = new URLSearchParams(
          window.location.hash.replace(/^#/, ''),
        )
        function pick(name) {
          return params.get(name) || hashParams.get(name) || ''
        }
        var payload = {
          source: 'bjj-dojo:oauth-callback',
          state: pick('state'),
          code: pick('code'),
          error: pick('error'),
          errorDescription: pick('error_description'),
        }
        var msgEl = document.getElementById('msg')
        if (window.opener) {
          try {
            window.opener.postMessage(payload, window.location.origin)
            msgEl.textContent = 'Done — you can close this window.'
            setTimeout(function () {
              window.close()
            }, 200)
          } catch (e) {
            msgEl.textContent =
              'Could not return to the app. Close this window and try again.'
          }
        } else {
          msgEl.textContent = 'No opener window — close this tab and try again.'
        }
      })()
    </script>
  </body>
</html>
